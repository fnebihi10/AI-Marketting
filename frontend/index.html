<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AI Marketing Studio helps creators build polished video and photo ad campaigns from one streamlined workspace."
    />
    <meta name="theme-color" content="#ffffff" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <meta property="og:title" content="AI Marketing Studio" />
    <meta
      property="og:description"
      content="Create polished AI-powered ad campaigns, previews, and marketing assets in one workspace."
    />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <title>AI Marketing Studio</title>
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem('theme');
          const theme =
            storedTheme === 'light' || storedTheme === 'dark'
              ? storedTheme
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://js.puter.com/v2/"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
